[env:super_mini_esp32c3]
platform = platformio/espressif32@^6.12.0
board = super_mini_esp32c3-custom
build_unflags =
  ${env.build_unflags}
  -std=gnu99
  -std=gnu++11
build_flags =
  ${env.build_flags}
  -std=gnu17
  -std=gnu++17
  -Iboards/super_mini_esp32c3
board_build.variants_dir = boards/variants
