[env:rpipico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#v1.4.0-gcc14-arduinopico460
board = rpipico2-custom
build_unflags =
  ${env.build_unflags}
  -std=gnu++17
build_flags =
  ${env.build_flags}
  -DTFT_ESPI_USER_SETUP_PATH=\"../../boards/pinouts/User_Setup.h\"
  -std=gnu++23
  -Iboards/rpipico2
